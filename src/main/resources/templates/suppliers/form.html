<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>SupplyFlow - Suppliers Form</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen font-sans">

<div class="bg-white p-8 rounded shadow-lg w-full max-w-md">
    <h2 class="text-2xl font-bold mb-6 text-gray-800 text-center">Ajouter un Fournisseur</h2>

    <form th:action="@{/suppliers/save}" th:object="${supplier}" method="post" class="space-y-4">

        <div>
            <label class="block text-gray-700 mb-1">Nom de l'entreprise</label>
            <input type="text" th:field="*{name}" required class="w-full border border-gray-300 rounded px-3 py-2 focus:ring-2 focus:ring-blue-500">
        </div>

        <div>
            <label class="block text-gray-700 mb-1">Ville</label>
            <input type="text" th:field="*{city}" class="w-full border border-gray-300 rounded px-3 py-2 focus:ring-2 focus:ring-blue-500">
        </div>

        <div>
            <label class="block text-gray-700 mb-1">Téléphone</label>
            <input type="text" th:field="*{phone}" class="w-full border border-gray-300 rounded px-3 py-2 focus:ring-2 focus:ring-blue-500">
        </div>

        <div class="flex justify-between mt-6">
            <a href="/suppliers" class="text-gray-500 hover:text-gray-700 py-2">Annuler</a>
            <button type="submit" class="bg-blue-600 text-white px-6 py-2 rounded shadow hover:bg-blue-700 transition">Enregistrer</button>
        </div>
    </form>
</div>
</body>
</html>
