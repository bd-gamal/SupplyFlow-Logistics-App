<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>SupplyFlow - Suppliers</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 text-gray-800 font-sans">

<nav class="bg-blue-800 p-4 text-white shadow-md">
    <div class="container mx-auto flex justify-between items-center">
        <a href="/products" class="text-2xl font-bold tracking-wider">📦 SupplyFlow</a>
        <div class="space-x-4">
            <a href="/products" class="hover:text-blue-300">Produits</a>
            <a href="/suppliers" class="hover:text-blue-300 font-bold underline">Fournisseurs</a>
            <a href="/movements" class="hover:text-blue-300">Mouvements</a>
        </div>
    </div>
</nav>

<div class="container mx-auto mt-8 p-4">
    <div class="flex justify-between items-center mb-6 bg-white p-4 rounded shadow">
        <h1 class="text-3xl font-bold text-gray-700">Liste des Fournisseurs</h1>
        <a href="/suppliers/new" class="bg-blue-600 text-white px-4 py-2 rounded shadow hover:bg-blue-500 transition">+ Nouveau Fournisseur</a>
    </div>

    <div class="bg-white rounded shadow overflow-hidden">
        <table class="min-w-full text-left border-collapse">
            <thead class="bg-gray-200">
            <tr>
                <th class="p-4 border-b">ID</th>
                <th class="p-4 border-b">Nom</th>
                <th class="p-4 border-b">Ville</th>
                <th class="p-4 border-b">Téléphone</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="s : ${suppliers}" class="hover:bg-gray-50 border-b">
                <td class="p-4" th:text="${s.id}">1</td>
                <td class="p-4 font-semibold" th:text="${s.name}">Nom</td>
                <td class="p-4" th:text="${s.city}">Ville</td>
                <td class="p-4 text-gray-600" th:text="${s.phone}">0600000000</td>
            </tr>
            </tbody>
        </table>
    </div>
</div>
</body>
</html>
