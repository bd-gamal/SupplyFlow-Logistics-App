<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>SupplyFlow - Formulaire Produit</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen font-sans">

<div class="bg-white p-8 rounded shadow-lg w-full max-w-md">
    <h2 class="text-2xl font-bold mb-6 text-gray-800 text-center" th:text="${product.id == null ? 'Ajouter un Produit' : 'Modifier le Produit'}">Titre</h2>

    <form th:action="@{/products/save}" th:object="${product}" method="post" class="space-y-4">
        <input type="hidden" th:field="*{id}" />

        <div>
            <label class="block text-gray-700 mb-1">Nom du produit</label>
            <input type="text" th:field="*{name}" required class="w-full border border-gray-300 rounded px-3 py-2 focus:ring-2 focus:ring-blue-500">
        </div>

        <div>
            <label class="block text-gray-700 mb-1">Catégorie</label>
            <input type="text" th:field="*{category}" class="w-full border border-gray-300 rounded px-3 py-2 focus:ring-2 focus:ring-blue-500">
        </div>

        <div>
            <label class="block text-gray-700 mb-1">Prix</label>
            <input type="number" step="0.01" th:field="*{price}" required class="w-full border border-gray-300 rounded px-3 py-2 focus:ring-2 focus:ring-blue-500">
        </div>

        <div>
            <label class="block text-gray-700 mb-1">Fournisseur</label>
            <select th:field="*{supplier}" class="w-full border border-gray-300 rounded px-3 py-2 focus:ring-2 focus:ring-blue-500">
                <option value="">-- Sélectionner --</option>
                <option th:each="s : ${suppliers}" th:value="${s.id}" th:text="${s.name}"></option>
            </select>
        </div>

        <div class="flex justify-between mt-6">
            <a href="/products" class="text-gray-500 hover:text-gray-700 py-2">Annuler</a>
            <button type="submit" class="bg-blue-600 text-white px-6 py-2 rounded hover:bg-blue-700 transition">Enregistrer</button>
        </div>
    </form>
</div>
</body>
</html>
